<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>PRN20115</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        
        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="css/cross.css">
    </head>

    <body>
        <header>
            <div class="container mt-4">
                <div
                    class="row justify-content-center align-items-center g-3"
                >
                    <div class="col-sm-4" style="width: fit-content">
                        <label>Skills</label>
                    </div>
                    <div class="col-sm-4">
                        <input
                            type="text"
                            class="form-control"
                            name="skillInput"
                            id="skillInput"
                            aria-describedby="helpId"
                            placeholder="Enter skills"
                        />
                    </div>
                    <div class="col-sm-4" style="width: fit-content">
                        <input
                            name="ButtonSubmit"
                            id="ButtonSubmit"
                            class="btn btn-primary"
                            type="button"
                            value="Add"
                            onclick="AddSkill()"
                        />
                    </div>
                </div>
            </div>
        </header>
        <main>
            <div id="skillField" class="tag-box mt-5 ms-5 me-5 flex-row flex-wrap gap-2">
            </div>
        </main>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script>
            let skillSet = [];
            const skillContainer = document.getElementById('skillField');
            const skill = document.getElementById("skillInput");
            skill.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault(); // Prevent form submission
                    AddSkill(); // Call the function to add skill
                }
            });
            
            function renderTags(){
                skillContainer.innerHTML = '';

                skillSet.forEach((element,index) => {
                    const tag = document.createElement('div');
                    tag.className='tag';
                    tag.innerHTML=`${element} <span> <button class="cross" onclick="removeSkill(${index})"> X </button></span>`;
                    skillContainer.appendChild(tag);
                });
            }

            function AddSkill(){
                const skill = document.getElementById("skillInput");
                const skillElement = skill.value;
                if(skillElement.trim() === '') return; // Prevent adding empty skills
                if(skillSet.includes(skillElement)) {
                    alert('Skill already exists!');
                    return; // Prevent duplicates
                }
                skillSet.push(skillElement);
                skill.value = ''; // Clear input
                skill.focus(); // Focus back on input
                renderTags();
                // document.getElementById("skillField").innerHTML=skillElement
            }

            // Function to delete skill
            function removeSkill(index) {
                skillSet.splice(index, 1); // Remove from array
                renderTags(); // Re-render
            }
        </script>
    </body>
</html>
