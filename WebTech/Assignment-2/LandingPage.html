<html>
    <link rel="stylesheet" href="css/cross.css">
    <body>
        <header>
            <div class="mb-3">
                <label for="SkillSet" class="form-label">Skills</label>
                <input
                type="text"
                class="form-control"
                name="skillInput"
                id="skillInput"
                aria-describedby="helpId"
                placeholder="Enter skills"
                />
                <input
                name="ButtonSubmit"
                id="ButtonSubmit"
                class="btn btn-primary"
                type="button"
                value="Add"
                onclick="AddSkill()"
                />
            </div>
        </header>
        <main>
            <div id="skillField" class="tag-box">
            </div>
        </main>
    <script>
        let skillSet = [];
        const skillContainer = document.getElementById('skillField');
        
        function renderTags(){
            skillContainer.innerHTML = '';

            skillSet.forEach((element,index) => {
                const tag = document.createElement('div');
                tag.className='tag'
                tag.innerHTML=`${element} <span> <button class="cross" onclick="removeSkill(${index})"> X </button></span>`;
                skillContainer.appendChild(tag);
            });
        }

        function AddSkill(){
            const skill = document.getElementById("skillInput");
            const skillElement = skill.value;
            skillSet.push(skillElement);
            renderTags();
            // document.getElementById("skillField").innerHTML=skillElement
        }

        // Function to delete skill
        function removeSkill(index) {
            skillSet.splice(index, 1); // Remove from array
            renderTags(); // Re-render
        }
        </script>
    </body>
</html>
